name: Weekly TikTok Ad Report

on:
  schedule:
    # 每週日 00:00 台灣時間（UTC+8）= 週六 16:00 UTC
    - cron: "0 16 * * 6"
  workflow_dispatch:  # 手動觸發

jobs:
  pull-and-export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install httpx python-dotenv anthropic \
            google-api-python-client google-auth

      - name: Write token and credential files
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_ADVERTISER_IDS: ${{ secrets.TIKTOK_ADVERTISER_IDS }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p tiktok-marketing-api/.tokens
          echo "{\"access_token\": \"$TIKTOK_ACCESS_TOKEN\", \"advertiser_ids\": [\"$TIKTOK_ADVERTISER_IDS\"]}" \
            > tiktok-marketing-api/.tokens/advertiser.json
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > /tmp/service_account.json

      - name: Pull last 7 days ad data → CSV + Google Sheet
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_ADVERTISER_IDS: ${{ secrets.TIKTOK_ADVERTISER_IDS }}
          GOOGLE_SERVICE_ACCOUNT_FILE: /tmp/service_account.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_AD_TAB: TikTok廣告成效
        run: |
          cd tiktok-marketing-api
          python ad_reports.py --days 7 --csv

      - name: Commit CSV to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "chore: weekly TikTok ad report $(date +'%Y-%m-%d')"
          git push

      - name: Slack 通知（成功）
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"✅ *TikTok 週報跑完了*\n日期：$(date +'%Y-%m-%d')\n資料區間：最近 7 天\n已寫入 Google Sheet 與 CSV\"}"

      - name: Slack 通知（失敗）
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"❌ *TikTok 週報執行失敗*\n日期：$(date +'%Y-%m-%d')\n請到 GitHub Actions 查看錯誤：https://github.com/FAUST-777/social-platform-toolkit/actions\"}"
