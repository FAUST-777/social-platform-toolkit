name: Scheduled Hot Products

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Write service account
        run: echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > service-account.json
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      - name: Run collector
        env:
          GOOGLE_SERVICE_ACCOUNT_FILE: ./service-account.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_TAB: HotProducts
          CUSTOM_JSON_ENDPOINT: ${{ secrets.CUSTOM_JSON_ENDPOINT }}
          CUSTOM_JSON_AUTH_HEADER: ${{ secrets.CUSTOM_JSON_AUTH_HEADER }}
        run: hot-products run --config config/sources.example.yml
